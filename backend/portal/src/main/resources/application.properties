spring.application.name=CBSI School Management System

# Supabase JDBC session pooler (set password via env var)
# Set `SUPABASE_PASSWORD` in your environment: `set SUPABASE_PASSWORD=yourpassword` (Windows) or `export SUPABASE_PASSWORD=yourpassword` (Unix)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?user=postgres.tshryrnlslesysmfbcym&password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Prevent auto initialization of scripts if not needed
spring.datasource.initialization-mode=never
