spring.application.name=ramos

# Supabase JDBC session pooler configuration
# Important: DO NOT commit secrets. Provide the Supabase password via the `SUPABASE_PASSWORD` env var.
# On Windows (PowerShell):  $env:SUPABASE_PASSWORD = 'your-password'  (for the session)
# On Windows (CMD):        set SUPABASE_PASSWORD=your-password
# On Unix/macOS:           export SUPABASE_PASSWORD=your-password
#
# Use explicit `spring.datasource.username` and `spring.datasource.password` rather than embedding them in the URL.
# The pooler requires TLS; `sslmode=require` ensures a secured connection.
# swap out the password for the hardcoded given password if necessary
spring.datasource.url=jdbc:postgresql://34.126.143.198:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (connection pool) adjust to your environment
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Prevent auto initialization of scripts if not needed
spring.datasource.initialization-mode=never

# Notes:
# - If the password contains special characters you can keep it in the env var; no URL-encoding needed when using `spring.datasource.password`.
# - If authentication still fails, verify the pooler username and password by testing with psql or a DB client.
# - To debug connection properties enable SQL/connection debug logging temporarily (avoid logging secrets in production).

# JWT settings
# Provide a strong secret via the JWT_SECRET env var; do NOT commit secrets.
jwt.secret=BA6do76icSHBhEcEh4Q4f6tKiBrNLnPLqueUXpvUw+c=
# Token lifetime in milliseconds (default 24h)
jwt.expiration-ms=86400000

# --- SMTP / Spring Mail configuration (placeholders - replace with real values) ---
# Use environment variables or replace the placeholders below. Do NOT commit real secrets.
# Examples: Gmail (use App Password), SendGrid, Mailgun, Amazon SES, etc.
# spring.mail.host=<SMTP_HOST>
# spring.mail.port=<SMTP_PORT>
# spring.mail.username=<SMTP_USERNAME>
# spring.mail.password=<SMTP_PASSWORD>
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.default-encoding=UTF-8
# # Optional: 'from' address used in messages
# spring.mail.from=<no-reply@your-domain.com>
# # Set to true to test mail connection on startup (optional)
# spring.mail.test-connection=false

# Notes:
# - For Gmail, set 'spring.mail.host=smtp.gmail.com' and 'spring.mail.port=587',
#   and use an App Password (not your regular account password).
# - Prefer using environment variables to inject username/password securely.
